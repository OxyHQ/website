<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" href="/fonts/EmberModernDisplayStd-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/EmberModernDisplayStd-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>Oxy — The AI-Powered CRM for Go-To-Market Teams</title>
    <meta name="description" content="Search, update, and create across your entire CRM just by asking. Oxy is the AI CRM with Universal Context that deeply understands your business." />

    <!-- Open Graph -->
    <meta property="og:title" content="Oxy — The AI-Powered CRM for Go-To-Market Teams" />
    <meta property="og:description" content="Search, update, and create across your entire CRM just by asking. Oxy is the AI CRM with Universal Context that deeply understands your business." />
    <meta property="og:image" content="https://oxy.so/og-default.png" />
    <meta property="og:url" content="https://oxy.so" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oxy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oxy — The AI-Powered CRM for Go-To-Market Teams" />
    <meta name="twitter:description" content="Search, update, and create across your entire CRM just by asking. Oxy is the AI CRM with Universal Context." />
    <meta name="twitter:image" content="https://oxy.so/og-default.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Oxy",
      "url": "https://oxy.so",
      "logo": "https://oxy.so/favicon.svg",
      "description": "Oxy is the AI-powered CRM for go-to-market teams.",
      "sameAs": [
        "https://www.linkedin.com/company/oxyhq/",
        "https://x.com/oxyhqinc",
        "https://x.com/oxyhqes",
        "https://www.facebook.com/OxyHQInc",
        "https://mention.earth/@oxy"
      ]
    }
    </script>
  </head>
  <body>
    <script>
      // Apply saved theme mode + color preset before React renders (prevents FOUC).
      // Values are sourced from @oxyhq/bloom APP_COLOR_PRESETS at runtime by src/theme/.
      (function(){
        var mode = localStorage.getItem('theme');
        if (mode === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
