<!doctype html>
<!-- `lang` and `dir` get rewritten by LocaleProvider once React mounts.
     The static defaults below are used for the initial paint and any
     non-JS crawlers. -->
<html lang="en" dir="ltr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Brand-aware tags. Defaults are Oxy; host-meta.js swaps them on FairCoin hosts before React mounts. -->
    <link id="site-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link id="site-manifest" rel="manifest" href="/manifest.webmanifest" />
    <meta id="site-theme-color" name="theme-color" content="#0a0a0b" />
    <script src="/host-meta.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oxy, an open-source ecosystem of ethical technology</title>
    <meta name="description" content="Oxy is an independent, open-source ecosystem of ethical technology built to empower people, not exploit them. Apps, AI, an operating system, a browser, identity and more." />

    <!-- Open Graph -->
    <meta property="og:title" content="Oxy, an open-source ecosystem of ethical technology" />
    <meta property="og:description" content="Oxy is an independent, open-source ecosystem of ethical technology built to empower people, not exploit them. Apps, AI, an operating system, a browser, identity and more." />
    <meta property="og:image" content="https://oxy.so/og-default.png" />
    <meta property="og:url" content="https://oxy.so" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oxy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oxy, an open-source ecosystem of ethical technology" />
    <meta name="twitter:description" content="An independent, open-source ecosystem of ethical technology built to empower people, not exploit them." />
    <meta name="twitter:image" content="https://oxy.so/og-default.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Oxy",
      "url": "https://oxy.so",
      "logo": "https://oxy.so/favicon.svg",
      "description": "Oxy is an independent, open-source ecosystem of ethical technology built to empower people, not exploit them.",
      "sameAs": [
        "https://www.linkedin.com/company/oxyhq/",
        "https://x.com/oxyhqinc",
        "https://x.com/oxyhqes",
        "https://www.facebook.com/OxyHQInc",
        "https://mention.earth/@oxy"
      ]
    }
    </script>
  </head>
  <body>
    <script>
      // Apply saved theme mode + color preset before React renders (prevents FOUC).
      // Values are sourced from @oxyhq/bloom APP_COLOR_PRESETS at runtime by src/theme/.
      (function(){
        var mode = localStorage.getItem('theme');
        if (mode === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
