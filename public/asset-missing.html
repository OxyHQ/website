<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>File not found</title>
  </head>
  <body>
    <!--
      Destination for the `/assets/*`, `/images/*`, `/fonts/*` and `/models/*`
      rules in `_redirects`, which return a real 404 for missing files instead
      of falling through to the SPA shell.

      This file must exist, and must NOT be named `404.html`: Cloudflare Pages
      treats a `404.html` as its automatic not-found page and serves it ahead of
      the `/*` SPA catch-all, which breaks every client-side route that has no
      prerendered file. Pages also drops a `_redirects` rule whose destination is
      missing, so without this file those rules were silently ignored:
      a request for a hashed bundle that did not exist got the `/*` catch-all
      (`/index.html` with status 200), and `_headers` then told the browser to
      cache that HTML under a `.js` URL as `immutable, max-age=31536000`.
      The result was a poisoned cache entry serving HTML for a script — a blank
      page until the browser cache was cleared.
    -->
    <h1>Not found</h1>
    <p>The requested file does not exist. <a href="/">Go to homepage</a></p>
  </body>
</html>
