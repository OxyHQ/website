name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          # Must match the Dockerfile's `oven/bun:<ver>` — a bun mismatch across
          # lockfile consumers fails `--frozen-lockfile`.
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bun run build
        env:
          VITE_API_URL: https://website-api.oxy.so

      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=oxy-website --branch=main

      # Purge the oxy.so edge cache after every deploy. Cloudflare caches static
      # assets (a dashboard Cache Rule forces a multi-hour TTL that _headers
      # can't override), so a stale HTML response served for an asset URL during
      # deploy propagation can be frozen at the edge and blank the app until the
      # cache is purged. Purging on each deploy clears any such entry.
      # Tolerant of failure: if CLOUDFLARE_API_TOKEN lacks the Zone Cache Purge
      # permission this is a no-op and the deploy still succeeds.
      - name: Purge Cloudflare cache for oxy.so
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          zone_id=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=oxy.so" \
            | python3 -c "import json,sys; r=json.load(sys.stdin).get('result') or []; print(r[0]['id'] if r else '')")
          if [ -z "$zone_id" ]; then
            echo "::warning::could not resolve zone id for oxy.so (token may lack Zone:Read/Cache Purge); skipping purge"
            exit 0
          fi
          resp=$(curl -s -X POST -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$zone_id/purge_cache" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)"
